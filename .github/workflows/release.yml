name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release-linux:
    name: Linux portable bundle
    runs-on: ubuntu-22.04

    steps:
      - name: Check out source and submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install build and packaging dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            glslang-tools \
            libasound2-dev \
            libcurl4-openssl-dev \
            libfontconfig1-dev \
            libfreetype6-dev \
            libglfw3-dev \
            libjack-jackd2-dev \
            libvulkan-dev \
            libxkbcommon-x11-dev \
            meson \
            nasm \
            ninja-build \
            patchelf \
            pkg-config \
            qt6-base-dev \
            qt6-base-private-dev \
            qt6-wayland

      - name: Build
        run: ./build.sh

      - name: Create portable Linux bundle
        run: ./scripts/package_linux.sh --skip-build

      - name: Smoke-test packaged application
        env:
          JCUT_UI_AUTOMATION: "1"
          QT_QPA_PLATFORM: offscreen
        run: dist/JCut-x86_64.AppDir/AppRun --help

      - name: Generate checksum
        run: |
          cd dist
          sha256sum JCut-x86_64.tar.gz > JCut-x86_64.tar.gz.sha256

      - name: Publish release asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 || \
            gh release create "${GITHUB_REF_NAME}" --title "JCut ${GITHUB_REF_NAME}" --generate-notes
          gh release upload "${GITHUB_REF_NAME}" \
            dist/JCut-x86_64.tar.gz \
            dist/JCut-x86_64.tar.gz.sha256 \
            --clobber
